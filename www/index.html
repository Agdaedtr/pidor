<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1f1a2e" />
<title>Кошачье 2048 🐱</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg1: #2a2140;
    --bg2: #1a1530;
    --board: #3a2f55;
    --cellbg: rgba(255,255,255,0.06);
    --ink: #fdf6ff;
    --accent: #ffb454;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(140% 120% at 50% 0%, var(--bg1) 0%, var(--bg2) 70%);
    color: var(--ink);
    font-family: 'Nunito', system-ui, sans-serif;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start;
    padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    min-height: 100%;
    user-select: none; -webkit-user-select: none;
  }
  .wrap { width: min(92vw, 70vh, 460px); }

  header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .title { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: clamp(26px, 8vw, 40px); line-height: 1; letter-spacing: .5px; }
  .title span { color: var(--accent); }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: rgba(0,0,0,0.28); border-radius: 12px; padding: 7px 12px; text-align: center; min-width: 64px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .score-box .lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .65; font-weight: 800; }
  .score-box .val { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .score-box.bump { animation: bump .25s ease; }
  @keyframes bump { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 0 12px; }
  .hint { font-size: 13px; opacity: .75; font-weight: 600; }
  .btn {
    font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 15px;
    background: linear-gradient(180deg, #ffc56b, #ff9f33);
    color: #4a2c00; border: none; border-radius: 12px; padding: 9px 16px; cursor: pointer;
    box-shadow: 0 4px 0 #d97e16, 0 6px 12px rgba(0,0,0,.3); transition: transform .06s, box-shadow .06s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d97e16, 0 2px 6px rgba(0,0,0,.3); }

  .board {
    position: relative; width: 100%; aspect-ratio: 1 / 1;
    background: var(--board); border-radius: 18px; padding: var(--gap);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 14px 30px rgba(0,0,0,.45);
    touch-action: none;
  }
  .grid-bg { display: grid; grid-template-columns: repeat(4, var(--cell)); grid-template-rows: repeat(4, var(--cell)); gap: var(--gap); }
  .grid-cell { width: var(--cell); height: var(--cell); background: var(--cellbg); border-radius: 14px; }

  .tiles { position: absolute; inset: var(--gap); }
  .tile { position: absolute; width: var(--cell); height: var(--cell); transition: transform .12s ease-in-out; will-change: transform; }
  .tile-inner {
    width: 100%; height: 100%; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,.25), inset 0 -3px 6px rgba(0,0,0,.18), 0 3px 6px rgba(0,0,0,.2);
  }
  .tile .emoji { font-size: calc(var(--cell) * 0.46); line-height: 1; }
  .tile .name { font-size: calc(var(--cell) * 0.135); font-weight: 800; letter-spacing: .3px; opacity: .9; font-family: 'Baloo 2', cursive; }

  /* tiers */
  .tile-2    .tile-inner { background: #fde9d4; color: #6b4a2b; }
  .tile-4    .tile-inner { background: #fcd9b0; color: #6b4a2b; }
  .tile-8    .tile-inner { background: #f9bd7c; color: #5a3413; }
  .tile-16   .tile-inner { background: #f5a259; color: #fff; }
  .tile-32   .tile-inner { background: #f0863f; color: #fff; }
  .tile-64   .tile-inner { background: #ec6b34; color: #fff; }
  .tile-128  .tile-inner { background: #e8517c; color: #fff; }
  .tile-256  .tile-inner { background: #d23f97; color: #fff; }
  .tile-512  .tile-inner { background: #a64fd6; color: #fff; }
  .tile-1024 .tile-inner { background: #6f5be0; color: #fff; }
  .tile-2048 .tile-inner { background: linear-gradient(160deg,#ffd34e,#ff9f1c); color: #5a3400; box-shadow: inset 0 2px 0 rgba(255,255,255,.5), 0 0 22px rgba(255,193,77,.6); }
  .tile-super .tile-inner { background: linear-gradient(160deg,#3a2f55,#15101f); color: #ffd34e; box-shadow: inset 0 0 0 2px rgba(255,211,78,.6), 0 0 22px rgba(120,90,220,.5); }

  .tile-new .tile-inner { animation: appear .16s ease; }
  .tile-merged .tile-inner { animation: pop .2s ease; }
  @keyframes appear { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes pop { 0%{transform:scale(.3)} 55%{transform:scale(1.18)} 100%{transform:scale(1)} }

  .overlay {
    position: absolute; inset: 0; border-radius: 18px;
    background: rgba(26,21,48,.86); backdrop-filter: blur(3px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    text-align: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 5;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay .big { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: clamp(28px, 9vw, 44px); }
  .overlay .sub { font-size: 16px; opacity: .85; font-weight: 700; }
  .overlay .emoji-xl { font-size: 64px; line-height: 1; animation: pop .4s ease; }

  footer { margin-top: 14px; font-size: 12.5px; opacity: .6; text-align: center; font-weight: 600; line-height: 1.5; }
  footer b { color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">Кошачье <span>2048</span> 🐱</div>
      <div class="scores">
        <div class="score-box" id="scoreBox"><div class="lbl">Счёт</div><div class="val" id="score">0</div></div>
        <div class="score-box"><div class="lbl">Рекорд</div><div class="val" id="best">0</div></div>
      </div>
    </header>

    <div class="bar">
      <div class="hint">Свайпай — котики сливаются 🐾</div>
      <button class="btn" id="newGame">Новая игра</button>
    </div>

    <div class="board" id="board">
      <div class="grid-bg" id="gridBg"></div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <div class="emoji-xl" id="ovEmoji">😺</div>
        <div class="big" id="ovTitle">Игра окончена</div>
        <div class="sub" id="ovSub">Котикам некуда двигаться</div>
        <button class="btn" id="ovBtn">Играть снова</button>
      </div>
    </div>

    <footer>
      Соединяй одинаковых котиков, чтобы вырастить их.<br />
      Цель — дорастить до <b>Льва 🦁</b> (2048). Управление: свайп или стрелки.
    </footer>
  </div>

<script>
(function () {
  "use strict";
  var SIZE = 4;
  var board = document.getElementById('board');
  var gridBg = document.getElementById('gridBg');
  var tilesEl = document.getElementById('tiles');
  var scoreEl = document.getElementById('score');
  var bestEl = document.getElementById('best');
  var scoreBox = document.getElementById('scoreBox');
  var overlay = document.getElementById('overlay');
  var ovEmoji = document.getElementById('ovEmoji');
  var ovTitle = document.getElementById('ovTitle');
  var ovSub = document.getElementById('ovSub');
  var ovBtn = document.getElementById('ovBtn');

  // value -> {emoji, name}
  var CATS = {
    2: ['🐱', 'Котёнок'], 4: ['😺', 'Весёлый'], 8: ['😸', 'Улыбака'],
    16: ['😻', 'Влюблён'], 32: ['😼', 'Хитрюга'], 64: ['😽', 'Чмок'],
    128: ['🙀', 'Шок'], 256: ['😹', 'Ха-ха'], 512: ['🐈', 'Кот'],
    1024: ['🐈‍⬛', 'Чёрныш'], 2048: ['🦁', 'Лев'], 4096: ['🐯', 'Тигр'],
    8192: ['👑', 'Король'], 16384: ['🦄', 'Легенда']
  };
  function catFor(v) { return CATS[v] || ['✨', v]; }

  var CELL = 0, GAP = 0;
  function sizeBoard() {
    var w = board.clientWidth;
    GAP = Math.round(w * 0.028);
    CELL = (w - GAP * 5) / 4; // padding(gap)*2 + 3 inner gaps = 5 gaps
    board.style.setProperty('--cell', CELL + 'px');
    board.style.setProperty('--gap', GAP + 'px');
  }

  function buildGridBg() {
    gridBg.innerHTML = '';
    for (var i = 0; i < SIZE * SIZE; i++) {
      var c = document.createElement('div');
      c.className = 'grid-cell';
      gridBg.appendChild(c);
    }
  }

  // ---- Tile ----
  var tileId = 0;
  function Tile(x, y, value) {
    this.id = ++tileId; this.x = x; this.y = y; this.value = value;
    this.prev = null; this.mergedFrom = null;
  }

  // ---- Game state ----
  var grid, score, best, won, over, keepPlaying;

  function emptyGrid() {
    var g = [];
    for (var x = 0; x < SIZE; x++) { g[x] = []; for (var y = 0; y < SIZE; y++) g[x][y] = null; }
    return g;
  }
  function cell(x, y) { return (x >= 0 && x < SIZE && y >= 0 && y < SIZE) ? grid[x][y] : undefined; }

  function availableCells() {
    var out = [];
    for (var x = 0; x < SIZE; x++) for (var y = 0; y < SIZE; y++) if (!grid[x][y]) out.push({ x: x, y: y });
    return out;
  }
  function addRandomTile() {
    var avail = availableCells();
    if (!avail.length) return;
    var c = avail[Math.floor(Math.random() * avail.length)];
    var value = Math.random() < 0.9 ? 2 : 4;
    grid[c.x][c.y] = new Tile(c.x, c.y, value);
  }

  function setup() {
    grid = emptyGrid(); score = 0; won = false; over = false; keepPlaying = false;
    best = parseInt(localStorage.getItem('koshki-best') || '0', 10) || 0;
    addRandomTile(); addRandomTile();
    hideOverlay();
    actuate();
  }

  // direction: 0 up, 1 right, 2 down, 3 left
  var VECTORS = { 0: { x: 0, y: -1 }, 1: { x: 1, y: 0 }, 2: { x: 0, y: 1 }, 3: { x: -1, y: 0 } };
  function traversals(dir) {
    var v = VECTORS[dir]; var xs = [], ys = [];
    for (var i = 0; i < SIZE; i++) { xs.push(i); ys.push(i); }
    if (v.x === 1) xs.reverse();
    if (v.y === 1) ys.reverse();
    return { xs: xs, ys: ys };
  }
  function farthest(pos, v) {
    var prev;
    do { prev = pos; pos = { x: prev.x + v.x, y: prev.y + v.y }; }
    while (pos.x >= 0 && pos.x < SIZE && pos.y >= 0 && pos.y < SIZE && !grid[pos.x][pos.y]);
    return { farthest: prev, next: cell(pos.x, pos.y) };
  }

  function move(dir) {
    if (over || (won && !keepPlaying)) return;
    var v = VECTORS[dir]; var t = traversals(dir); var moved = false; var gained = 0;

    // prepare
    for (var x = 0; x < SIZE; x++) for (var y = 0; y < SIZE; y++) {
      var tt = grid[x][y]; if (tt) { tt.prev = { x: x, y: y }; tt.mergedFrom = null; }
    }

    t.xs.forEach(function (x) {
      t.ys.forEach(function (y) {
        var tile = grid[x][y];
        if (!tile) return;
        var f = farthest({ x: x, y: y }, v);
        var next = f.next;
        if (next && next.value === tile.value && !next.mergedFrom) {
          var merged = new Tile(next.x, next.y, tile.value * 2);
          merged.mergedFrom = [tile, next];
          grid[next.x][next.y] = merged;
          grid[x][y] = null;
          tile.x = next.x; tile.y = next.y;
          gained += merged.value;
          if (merged.value === 2048 && !won) won = true;
        } else {
          if (f.farthest.x !== x || f.farthest.y !== y) {
            grid[x][y] = null; grid[f.farthest.x][f.farthest.y] = tile;
            tile.x = f.farthest.x; tile.y = f.farthest.y;
          }
        }
        if (tile.x !== x || tile.y !== y) moved = true;
      });
    });

    if (moved) {
      score += gained;
      if (gained > 0) { scoreBox.classList.remove('bump'); void scoreBox.offsetWidth; scoreBox.classList.add('bump'); }
      if (score > best) { best = score; localStorage.setItem('koshki-best', best); }
      addRandomTile();
      if (!movesAvailable()) over = true;
      actuate();
    }
  }

  function movesAvailable() {
    if (availableCells().length) return true;
    for (var x = 0; x < SIZE; x++) for (var y = 0; y < SIZE; y++) {
      var tile = grid[x][y]; if (!tile) continue;
      for (var d in VECTORS) {
        var v = VECTORS[d]; var o = cell(x + v.x, y + v.y);
        if (o && o.value === tile.value) return true;
      }
    }
    return false;
  }

  // ---- Render ----
  function pos(x, y) { return 'translate(' + (x * (CELL + GAP)) + 'px,' + (y * (CELL + GAP)) + 'px)'; }
  function tierClass(v) { return CATS[v] && v <= 2048 ? ('tile-' + v) : (v < 2 ? 'tile-2' : (v > 2048 ? 'tile-super' : 'tile-' + v)); }

  function makeTile(tile, animate) {
    var wrap = document.createElement('div');
    wrap.className = 'tile ' + tierClass(tile.value);
    var info = catFor(tile.value);
    wrap.innerHTML = '<div class="tile-inner"><div class="emoji">' + info[0] + '</div><div class="name">' + info[1] + '</div></div>';
    var start = (animate && tile.prev) ? tile.prev : { x: tile.x, y: tile.y };
    wrap.style.transform = pos(start.x, start.y);

    if (animate && tile.prev) {
      requestAnimationFrame(function () { wrap.style.transform = pos(tile.x, tile.y); });
    } else if (animate && tile.mergedFrom) {
      wrap.classList.add('tile-merged');
    } else if (animate) {
      wrap.classList.add('tile-new');
    }
    tilesEl.appendChild(wrap);
  }

  function actuate(noAnim) {
    var animate = !noAnim;
    // render merged source tiles first (so they slide under the merged tile)
    requestAnimationFrame(function () {
      tilesEl.innerHTML = '';
      for (var x = 0; x < SIZE; x++) for (var y = 0; y < SIZE; y++) {
        var tile = grid[x][y]; if (!tile) continue;
        if (animate && tile.mergedFrom) {
          tile.mergedFrom.forEach(function (src) { makeTile(src, true); });
        }
        makeTile(tile, animate);
      }
      scoreEl.textContent = score;
      bestEl.textContent = best;
      if (over) showOverlay(false);
      else if (won && !keepPlaying) showOverlay(true);
    });
  }

  function relayout() { sizeBoard(); actuate(true); }

  // ---- Overlay ----
  function showOverlay(isWin) {
    if (isWin) {
      ovEmoji.textContent = '🦁'; ovTitle.textContent = 'Победа! 🎉';
      ovSub.textContent = 'Ты вырастил Льва! Можно продолжать.';
      ovBtn.textContent = 'Продолжить';
    } else {
      ovEmoji.textContent = '😿'; ovTitle.textContent = 'Игра окончена';
      ovSub.textContent = 'Счёт: ' + score + ' · Рекорд: ' + best;
      ovBtn.textContent = 'Играть снова';
    }
    overlay.dataset.win = isWin ? '1' : '0';
    overlay.classList.add('show');
  }
  function hideOverlay() { overlay.classList.remove('show'); }

  ovBtn.addEventListener('click', function () {
    if (overlay.dataset.win === '1' && !over) { keepPlaying = true; hideOverlay(); }
    else setup();
  });
  document.getElementById('newGame').addEventListener('click', setup);

  // ---- Input: keyboard ----
  var KEYMAP = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3, w: 0, d: 1, s: 2, a: 3, W: 0, D: 1, S: 2, A: 3 };
  window.addEventListener('keydown', function (e) {
    if (e.key in KEYMAP) { e.preventDefault(); move(KEYMAP[e.key]); }
  });

  // ---- Input: touch / swipe ----
  var sx = 0, sy = 0, tracking = false;
  board.addEventListener('touchstart', function (e) {
    var t = e.touches[0]; sx = t.clientX; sy = t.clientY; tracking = true;
  }, { passive: true });
  board.addEventListener('touchmove', function (e) { if (tracking) e.preventDefault(); }, { passive: false });
  board.addEventListener('touchend', function (e) {
    if (!tracking) return; tracking = false;
    var t = e.changedTouches[0];
    handleSwipe(t.clientX - sx, t.clientY - sy);
  }, { passive: true });

  // mouse drag (desktop testing)
  var mdown = false;
  board.addEventListener('mousedown', function (e) { mdown = true; sx = e.clientX; sy = e.clientY; });
  window.addEventListener('mouseup', function (e) { if (!mdown) return; mdown = false; handleSwipe(e.clientX - sx, e.clientY - sy); });

  function handleSwipe(dx, dy) {
    var ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 24) return;
    if (ax > ay) move(dx > 0 ? 1 : 3);
    else move(dy > 0 ? 2 : 0);
  }

  window.addEventListener('resize', relayout);

  // ---- Start ----
  buildGridBg();
  sizeBoard();
  setup();
})();
</script>
</body>
</html>
